<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <!-- Background Gradient matching Dark Theme -->
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1c1c24"/>
            <stop offset="100%" stop-color="#050508"/>
        </linearGradient>
        
        <!-- Cyan/Purple Gradient matching jfaundez.tech accents -->
        <linearGradient id="dotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00f2fe"/>
            <stop offset="100%" stop-color="#8e2de2"/>
        </linearGradient>
        
        <!-- Glow effect -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background rounded square with subtle border -->
    <rect width="512" height="512" rx="120" fill="url(#bg)"/>
    <rect x="4" y="4" width="504" height="504" rx="116" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="6"/>
    
    <!-- Letter "j" -->
    <path d="M220 160 L250 160 L250 330 C250 360 230 380 200 380 C170 380 150 360 150 340 L180 340 C180 350 190 355 200 355 C210 355 220 345 220 330 Z" fill="#f0f0f5"/>
    <!-- Dot of the "j" -->
    <circle cx="235" cy="120" r="16" fill="#f0f0f5"/>
    
    <!-- Letter "f" -->
    <path d="M340 120 C310 120 290 140 290 170 L290 200 L260 200 L260 230 L290 230 L290 380 L320 380 L320 230 L360 230 L360 200 L320 200 L320 170 C320 155 330 145 340 145 L360 145 L360 120 Z" fill="#f0f0f5"/>
    
    <!-- Tech Dot representing ".tech" and the brand's gradient -->
    <circle cx="400" cy="360" r="20" fill="url(#dotGrad)" filter="url(#glow)"/>
</svg>
