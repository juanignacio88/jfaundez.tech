<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historia jfaundez.tech - Instagram Desarrollo Web</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    
    <style>
        :root {
            --bg-color: #050508;
            --text-primary: #f0f0f5;
            --text-secondary: #a0a0b0;
            --accent-cyan: #00f2fe;
            --accent-purple: #8e2de2;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --font-heading: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        body {
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: var(--font-body);
        }

        .story-wrapper {
            width: 405px;
            height: 720px;
            position: relative;
            background-color: var(--bg-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 40px 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .story-wrapper::before {
            content: '';
            position: absolute;
            top: -10%; left: -20%; width: 150%; height: 150%;
            background: radial-gradient(circle at 80% 30%, rgba(0, 242, 254, 0.15), transparent 40%),
                        radial-gradient(circle at 20% 70%, rgba(142, 45, 226, 0.15), transparent 40%);
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .brand {
            font-family: var(--font-heading);
            font-weight: 900;
            font-size: 1.2rem;
            color: var(--text-primary);
            text-align: center;
            margin-bottom: 2rem;
            opacity: 0.8;
        }
        .brand .dot { color: var(--accent-cyan); }

        .hook {
            font-family: var(--font-heading);
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1.1;
            text-align: center;
            margin-bottom: 1.5rem;
            color: white;
        }
        .text-gradient {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .visual-center {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin: 2rem 0;
        }

        .glass-icon {
            width: 130px;
            height: 130px;
            background: var(--glass-bg);
            border: 1px solid rgba(0, 242, 254, 0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4rem;
            color: var(--accent-cyan);
            backdrop-filter: blur(12px);
            box-shadow: 0 0 40px rgba(0, 242, 254, 0.2);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .body-text {
            color: var(--text-secondary);
            font-size: 1.1rem;
            text-align: center;
            line-height: 1.5;
            margin-bottom: auto;
        }
        .body-text strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        .footer-space {
            text-align: center;
            margin-top: 2rem;
            padding-bottom: 1rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 1rem;
        }
        
        .swipe-indicator {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            color: var(--accent-cyan);
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .swipe-indicator i {
            margin-bottom: 5px;
            font-size: 1.5rem;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
    </style>
</head>
<body>

    <div class="story-wrapper">
        <div class="content">
            <div class="brand">jfaundez<span class="dot">.tech</span></div>
            <h1 class="hook">¿Tu negocio parece profesional o solo un <span class="text-gradient">pasatiempo</span>?</h1>

            <div class="visual-center">
                <div class="glass-icon">
                    <i class="fas fa-laptop-code"></i>
                </div>
            </div>

            <p class="body-text">
                Profesionalizo tu marca con una web que proyecte confianza de verdad. Diseño <strong>landings y sitios corporativos</strong> enfocados en convertir visitas en clientes, no solo en "verse bonitos".
            </p>

            <div class="footer-space">
                <div class="swipe-indicator">
                    <i class="fas fa-paper-plane"></i>
                    Escríbeme al DM
                </div>
                <p style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 5px;">y hablemos de tu próximo sitio.</p>
            </div>
        </div>
    </div>

</body>
</html>
